  <link rel="stylesheet" href="/styles.css" />
  <style>
    .rankings-tabs {
      display: flex;
      gap: 8px;
      margin: 24px 0 8px;
      flex-wrap: wrap;
    }
    .rankings-tabs .tab {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 9px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .rankings-tabs .tab:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }
    .rankings-tabs .tab.active {
      background: var(--accent);
      color: #1a0b05;
      border-color: var(--accent);
    }
    .rankings-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    /* Rankings card grid */
    .rankings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .ranking-card {
      position: relative;
      display: flex;
      gap: 14px;
      background: var(--card-bg, var(--bg-elev));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .ranking-card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 8px 24px -8px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }
    .ranking-card.ranking-top {
      border-color: rgba(124, 92, 255, 0.35);
      box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.15);
    }
    .ranking-medal {
      position: absolute;
      top: -8px;
      left: -4px;
      font-size: 24px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      z-index: 1;
    }
    .ranking-num {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--text-dim);
      opacity: 0.5;
    }
    .ranking-card-img {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-elev);
    }
    .ranking-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .ranking-card-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(124,92,255,0.1), rgba(66,214,164,0.1));
    }
    .ranking-card-placeholder .brand-mark {
      font-size: 28px;
      color: var(--accent);
      opacity: 0.4;
    }
    .ranking-card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ranking-card-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ranking-card-title:hover { color: var(--accent); }
    .ranking-card-pitch {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0;
    }
    .ranking-score-block {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .ranking-score-num {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .ranking-score-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ranking-likes-num {
      font-size: 16px;
      font-weight: 700;
      color: var(--heart, #ff4060);
    }
    .ranking-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 4px;
    }
    .ranking-author {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .ranking-author:hover { text-decoration: underline; }
    .ranking-card .chip-row { margin-top: 2px; }
    .ranking-card .chip {
      font-size: 10px;
      padding: 2px 7px;
    }
    .ranking-card .like-btn {
      padding: 4px 10px;
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .rankings-grid {
        grid-template-columns: 1fr;
      }
      .ranking-card-img {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
