<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rankings — DiscoverHermes</title>
  <meta name="description" content="Top-rated agents ranked by AI score on DiscoverHermes." />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .rankings-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
    }
    .rankings-table th,
    .rankings-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .rankings-table th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      font-weight: 600;
    }
    .rankings-table tbody tr:hover {
      background: var(--bg-elev);
    }
    .rank-row {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dim);
      width: 50px;
    }
    .rank-top-3 .rank-row { color: var(--accent-2); }
    .rank-title {
      font-weight: 600;
      color: var(--text);
    }
    .rank-title:hover { color: var(--accent); }
    .rank-score {
      font-weight: 700;
      font-size: 20px;
    }
    .rank-grade {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
    }
    .grade-S { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a0b05; }
    .grade-A { background: var(--accent-soft); color: var(--accent); }
    .grade-B { background: rgba(139, 195, 74, 0.15); color: #8bc34a; }
    .grade-C { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
    .grade-D { background: rgba(158, 158, 158, 0.15); color: #9e9e9e; }
    .rank-meta {
      font-size: 13px;
      color: var(--text-dim);
    }
    .score-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
      width: 80px;
    }
    .score-fill {
      height: 100%;
      background: var(--accent-2);
      border-radius: 3px;
    }
    .rank-likes {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 16px;
      color: var(--heart);
    }
    .rank-likes::before {
      content: '♥';
      font-size: 15px;
    }
    .rank-likes.zero {
      color: var(--text-dim);
      font-weight: 500;
    }
    .rankings-tabs {
      display: flex;
      gap: 8px;
      margin: 24px 0 8px;
      flex-wrap: wrap;
    }
    .rankings-tabs .tab {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 9px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .rankings-tabs .tab:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }
    .rankings-tabs .tab.active {
      background: var(--accent);
      color: #1a0b05;
      border-color: var(--accent);
    }
    .rankings-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }
    @media (max-width: 640px) {
      .col-hide-mobile { display: none; }
    }
  </style>
</head>
<body data-page="rankings">
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark">◆</span>
      <span>DiscoverHermes</span>
    </a>
    <nav>
      <a class="ghost" href="/">Feed</a>
      <a class="ghost active" href="/rankings">Rankings</a>
      <a class="ghost" href="/stats">Stats</a>
      <a class="ghost" href="https://hermes-agent.nousresearch.com/" target="_blank" rel="noopener">Install Hermes</a>
      <a class="primary" href="/submit">Showoff your agent</a>
    </nav>
  </header>

  <section class="hero narrow">
    <h1>Agent Rankings</h1>
  </section>

  <main class="rankings-main">
    <div class="rankings-tabs" role="tablist">
      <button class="tab active" data-view="ai">AI Rankings</button>
      <button class="tab" data-view="liked">Human Rankings</button>
    </div>
    <table class="rankings-table" id="rankings-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Agent</th>
          <th>Score</th>
          <th class="col-hide-mobile">Likes</th>
          <th class="col-hide-mobile">Meta</th>
        </tr>
      </thead>
      <tbody id="rankings-body">
        <tr><td colspan="5" class="loading">Loading rankings…</td></tr>
      </tbody>
    </table>
  </main>

  <footer class="site-footer">
    <span>Built for the Hermes community by <a href="https://x.com/Shaughnessy119" target="_blank" rel="noopener">@Shaughnessy119</a>.</span>
    <a href="/submit">Show off what you built →</a>
  </footer>

  <script src="/app.js"></script>
  <script src="/rankings.js"></script>
</body>
</html>
